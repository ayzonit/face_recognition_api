version: '3.9'

services:

  db:
    image: postgres-15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data/:var/lib/postgresql/data
    networks:
      - app-networks
    healthcheck:
      test: ["CMD_SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 2

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./outputs:/app/outputs
    networks:
      - app-net
    depends-on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    restart: unless-stopped
    ports: 
      - "80:80"
    networks:
      - app-net
    depends_on:
      - backend

volumes:
  postgres-data:

networks:
  app-net:
  driver: bridge   
